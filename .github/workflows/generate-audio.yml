name: Daily Briefing

on:
  # 每天 UTC 22:30（北京时间 06:30）运行
  schedule:
    - cron: '30 22 * * *'
  # 手动触发（GitHub Actions 页面点 "Run workflow"）
  workflow_dispatch:
    inputs:
      skip_telegram:
        description: '跳过 Telegram 推送'
        required: false
        type: boolean
        default: false
      telegram_audio_only:
        description: '只推送音频（跳过文字）'
        required: false
        type: boolean
        default: false
      telegram_text_only:
        description: '只推送文字（跳过音频）'
        required: false
        type: boolean
        default: false

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    if: github.repository == 'star23/day1global-briefing'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily briefing
        run: |
          ARGS=""
          if [ "${{ inputs.skip_telegram }}" = "true" ]; then
            ARGS="$ARGS --skip-telegram"
          fi
          if [ "${{ inputs.telegram_audio_only }}" = "true" ]; then
            ARGS="$ARGS --telegram-audio-only"
          fi
          if [ "${{ inputs.telegram_text_only }}" = "true" ]; then
            ARGS="$ARGS --telegram-text-only"
          fi
          npx tsx scripts/daily-briefing.ts $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          BRIEFING_BASE_URL: https://brief.day1global.xyz
